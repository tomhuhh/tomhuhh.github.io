- date: "2026-04"
  title: "Presented ammonia-monitoring research at the EGU General Assembly"
  summary: >
    Presented high-temporal-resolution ammonia concentration measurements
    from a naturally ventilated dairy barn, and how they inform RuFaS
    housing-ammonia prediction refinement, at the European Geosciences
    Union General Assembly in Vienna, Austria.
  link_label: "View the abstract"
  link_url: "https://doi.org/10.5194/egusphere-egu26-8438"

- date: "2025-10-20"
