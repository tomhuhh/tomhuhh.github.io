- date: "2026-06-09"
  title: "Awarded the 2026 NMPF National Dairy Leadership Scholarship"
  summary: >
    The National Milk Producers Federation named Haowen one of five 2026
    National Dairy Leadership Scholarship recipients, recognizing his
    doctoral research on whole-farm environmental modeling in US dairy
    systems through model evaluation and field-based refinement.
  link_label: "Read the NMPF announcement"
  link_url: "https://www.nmpf.org/nmpf-awards-2026-national-dairy-leadership-scholarship-winners/"

- date: "2026-04"
  title: "Presented ammonia-monitoring research at the EGU General Assembly"
  summary: >
    Presented high-temporal-resolution ammonia concentration measurements
    from a naturally ventilated dairy barn, and how they inform RuFaS
    housing-ammonia prediction refinement, at the European Geosciences
    Union General Assembly in Vienna, Austria.
  link_label: "View the abstract"
  link_url: "https://doi.org/10.5194/egusphere-egu26-8438"

- date: "2026-06"
  title: "Published lead-author paper on interlaboratory manure analysis"
  summary: >
    Published “Assessing precision and accuracy of manure volatile solids,
    total nitrogen, and total ammoniacal nitrogen analyses across 6 commercial
    laboratories” in Journal of Dairy Science Communications, quantifying
    measurement variability that propagates into farm nutrient and emissions
    accounting.
  link_label: "Read the paper"
  link_url: "https://doi.org/10.3168/jdsc.2025-1007"

- date: "2025-08-25"
  title: "Published lead-author paper on RuFaS systems engineering"
  summary: >
    Published “Transdisciplinary model-based systems engineering in the
    development of the Ruminant Farm Systems model” in Frontiers in
    Sustainability, detailing the engineering process behind RuFaS.
  link_label: "Read the paper"
  link_url: "https://doi.org/10.3389/frsus.2025.1561453"

