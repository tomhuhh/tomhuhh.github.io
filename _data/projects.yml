- title: "Field-based ammonia emission quantification"
  theme: ammonia
  image: "ammonia-sensor-measurement.jpg"
  role: "Graduate Research Assistant (lead)"
  description: >
    Leading field quantification of barn ammonia emissions using sensor
    networks and ventilation-based flux methods at the Cornell CAST Farm of
    the Future barns to build a high-temporal-resolution emissions dataset.
  methods: "Gas sensor networks, wind-speed / ventilation-based flux estimation"
  outcomes: "High-temporal-resolution ammonia emissions dataset; presented at EGU General Assembly 2026."
  links:
    - label: "EGU26 abstract"
      url: "https://doi.org/10.5194/egusphere-egu26-8438"

- title: "Data assimilation of simulated ammonia measurements into RuFaS"
  theme: ammonia
  image: "ammonia-data-assimilation.jpg"
  role: "Graduate Research Assistant (lead)"
  description: >
    Assimilating simulated ammonia emissions into the Ruminant Farm
    Systems (RuFaS) model to refine its housing-emission parameters and
    improve the accuracy of predicted farm-scale ammonia losses.
  methods: "Data assimilation, parameter refinement, RuFaS"
  outcomes: "Refined RuFaS housing-emission predictions; presented at ADSA 2025."
  links:
    - label: "ADSA 2025 abstract"
      url: "https://ecommons.cornell.edu/bitstreams/5d9b3a7f-20f4-4bac-9007-94c578c6b6af/download"

- title: "RuFaS vs. COMET-Farm: methodological comparison of greenhouse-gas estimates"
  theme: modeling
  image: "comet-farm.jpg"
  role: "Graduate Research Assistant (lead)"
  description: >
    Comparing the Ruminant Farm Systems (RuFaS) model against COMET-Farm, a
    greenhouse-gas accounting tool widely used by researchers and
    policymakers, to identify the methodological drivers of differing
    emissions estimates across US Holstein dairy systems.
  methods: "Whole-farm simulation (RuFaS), COMET-Farm benchmarking, 5 US Holstein dairy case farms"
  outcomes: "Manuscript in preparation (planned submission August 2026)."
  links: []

- title: "Multi-laboratory evaluation of manure nutrient analyses"
  theme: ammonia
  image: "manure-lab-variability.jpg"
  role: "Project director"
  description: >
    Directed a multi-lab evaluation of manure volatile solids, total nitrogen,
    and total ammoniacal nitrogen analyses across 6 commercial laboratories to
    quantify measurement variability that propagates into farm nutrient and
    emissions accounting.
  methods: "Interlaboratory comparison, manure and biological sampling, statistical analysis"
  outcomes: "Published in Journal of Dairy Science Communications (2026)."
  links:
    - label: "Read the paper"
      url: "https://doi.org/10.3168/jdsc.2025-1007"

- title: "Transdisciplinary model-based systems engineering of the RuFaS model"
  theme: modeling
  image: "rufas-mbse.png"
  role: "Graduate Research Assistant (lead author)"
  description: >
    Applied model-based systems engineering (MBSE) and transdisciplinary
    methods to formalize the architecture and development process of the
    Ruminant Farm Systems (RuFaS) model, improving traceability, modularity,
    and collaboration across animal science, agronomy, and software teams.
  methods: "Model-based systems engineering (MBSE), transdisciplinary requirements engineering, software architecture"
  outcomes: "Published as lead author in Frontiers in Sustainability (2025); simulated and benchmarked 12 US dairy systems against published data."
  links:
    - label: "Read the paper"
      url: "https://doi.org/10.3389/frsus.2025.1561453"

- title: "Automated ration formulation within RuFaS"
  theme: modeling
  image: "rufas.png"
  role: "Lead"
  description: >
    Built automated ration-formulation logic for lactating cows within RuFaS
    and compared outcomes across nutrient requirement models, showing model
    choice measurably changes predicted diets and emissions estimates.
  methods: "Ration optimization, nutrient requirement modeling, RuFaS"
  outcomes: "Presented at the Canadian Society of Animal Science meeting (2024)."
  links:
    - label: "Proceedings"
      url: "https://doi.org/10.1139/cjas-2024-0024#subarticle-8"

- title: "Tailored lactation-curve estimation for whole-farm dairy simulation"
  theme: modeling
  image: "lactation-curve.jpg"
  role: "Co-author"
  description: >
    Developed a 2-step approach for tailored lactation-curve estimation and
    quantified its systemic impacts on whole-farm dairy simulation outputs,
    showing how curve choice propagates through production and emissions
    estimates.
  methods: "Lactation-curve modeling, 2-step estimation, whole-farm simulation (RuFaS)"
  outcomes: "Published in Journal of Dairy Science (2025)."
  links:
    - label: "Read the paper"
      url: "https://doi.org/10.3168/jds.2025-26334"

