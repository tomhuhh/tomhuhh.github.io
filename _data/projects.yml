- title: "Field-based ammonia emission quantification"
  theme: ammonia
  image: "ammonia-sensor-measurement.jpg"
  role: "Lead"
  description: >
    Quantifying barn ammonia emissions with sensor networks and
    ventilation-based flux methods at Cornell's CAST Farm of the Future.
  methods: "Gas sensor networks, ventilation-based flux estimation"
  outcomes: "High-resolution ammonia dataset; presented at EGU General Assembly 2026 and ADSA 2026."
  links:
    - label: "EGU26 abstract"
      url: "https://doi.org/10.5194/egusphere-egu26-8438"

- title: "Data assimilation of simulated ammonia measurements into RuFaS"
  theme: ammonia
  image: "ammonia-data-assimilation.jpg"
  role: "Lead"
  description: >
    Assimilating simulated ammonia emissions into the Ruminant Farm Systems
    (RuFaS) model to refine its housing-emission parameters.
  methods: "Data assimilation, parameter refinement, RuFaS"
  outcomes: "Developed algorithms to refine RuFaS housing emission predictions; presented at ADSA 2025."
  links:
    - label: "ADSA 2025 abstract"
      url: "https://ecommons.cornell.edu/bitstreams/5d9b3a7f-20f4-4bac-9007-94c578c6b6af/download"

- title: "RuFaS vs. COMET-Farm: methodological comparison of greenhouse-gas estimates"
  theme: modeling
  image: "comet-farm.jpg"
  role: "Lead"
  description: >
    Comparing the RuFaS model with COMET-Farm to identify the methodological
    drivers of differing greenhouse-gas estimates for US dairy systems.
  methods: "Whole-farm simulation (RuFaS), COMET-Farm benchmarking, 5 US Holstein dairy case farms"
  outcomes: "Manuscript in preparation (2026)."
  links: []

- title: "Multi-laboratory evaluation of manure nutrient analyses"
  theme: ammonia
  image: "manure-lab-variability.jpg"
  role: "Lead"
  description: >
    Multi-lab evaluation of manure volatile solids, nitrogen, and ammoniacal
    nitrogen across 6 laboratories, quantifying measurement variability that
    affects farm nutrient and emissions accounting.
  methods: "Interlaboratory comparison, manure sampling, statistical analysis"
  outcomes: "Published in JDS Communications (2026)."
  links:
    - label: "Read the paper"
      url: "https://doi.org/10.3168/jdsc.2025-1007"

- title: "Transdisciplinary model-based systems engineering of the RuFaS model"
  theme: modeling
  image: "rufas-mbse.png"
  role: "Lead"
  description: >
    Applied model-based systems engineering (MBSE) to formalize the
    architecture and development of the RuFaS model, benchmarked across
    12 dairy management scenarios.
  methods: "Model-based systems engineering (MBSE), requirements engineering"
  outcomes: "Published as lead author in Frontiers in Sustainability (2025)."
  links:
    - label: "Read the paper"
      url: "https://doi.org/10.3389/frsus.2025.1561453"

- title: "Evaluation of automated ration formulation in RuFaS"
  theme: modeling
  image: "rufas.png"
  role: "Lead"
  description: >
    Built automated ration-formulation logic for lactating cows in RuFaS and
    compared nutrient requirement models, showing model choice changes
    predicted diets and emissions.
  methods: "Ration optimization, nutrient requirement modeling, RuFaS"
  outcomes: "Presented at the Animal Modellers' Group annual meeting (2023)."
  links:
    - label: "Proceedings"
      url: "https://doi.org/10.1139/cjas-2024-0024#subarticle-8"

- title: "Tailored lactation-curve estimation for whole-farm dairy simulation"
  theme: modeling
  image: "lactation-curve.jpg"
  role: "Co-lead"
  description: >
    A 2-step approach for tailored lactation-curve estimation, showing how
    curve choice propagates through production and emissions estimates in
    whole-farm dairy simulation.
  methods: "Lactation-curve modeling, whole-farm simulation (RuFaS)"
  outcomes: "Published in Journal of Dairy Science (2025)."
  links:
    - label: "Read the paper"
      url: "https://doi.org/10.3168/jds.2025-26334"

- title: "Markov-chain herd simulation for feed-additive economics"
  theme: modeling
  image: "Markov-chain_herd_simulation.jpg"
  role: "Lead"
  description: >
    A Markov-chain herd simulation quantifying the economic feasibility of
    3-nitrooxypropanol and bromoform-containing feed additives for enteric
    methane mitigation.
  methods: "Markov-chain herd simulation, economic feasibility analysis"
  outcomes: "Presented at the Animal Science Modellers' Group annual meeting (2026)."
  links: []

